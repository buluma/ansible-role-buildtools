---
- name: Verify
  hosts: all
  become: false
  gather_facts: false

  tasks:
    - name: run gcc
      ansible.builtin.command:
        cmd: gcc --version
      changed_when: false

    - name: run make
      ansible.builtin.command:
        cmd: make --version
      changed_when: false

    - name: run shasum
      ansible.builtin.command:
        cmd: shasum --version
      changed_when: false

    - name: run bison
      ansible.builtin.command:
        cmd: bison --version
      changed_when: false
